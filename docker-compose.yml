version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: escapepulse
      POSTGRES_PASSWORD: escapepulse123
      POSTGRES_DB: escapepulse
    ports:
      - '5456:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U escapepulse']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '4016:4016'
    environment:
      DATABASE_URL: postgresql://escapepulse:escapepulse123@postgres:5432/escapepulse?schema=public
      JWT_SECRET: escapepulse-dev-secret
      FRONTEND_URL: http://localhost:3016
      PORT: 4016
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run deploy

  frontend:
    build: ./frontend
    ports:
      - '3016:3016'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4016/api
    depends_on:
      - backend
